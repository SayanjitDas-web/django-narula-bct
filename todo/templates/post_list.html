<h1>Posts</h1>

<a href="{% url 'post_create' %}">Create New</a>

<ul>
    {% for post in object_list %}
        <li>
            {{ post.title }}
            <a href="{% url 'post_update' post.id %}">Edit</a>
            <a href="{% url 'post_delete' post.id %}">Delete</a>
        </li>
    {% endfor %}
</ul>
